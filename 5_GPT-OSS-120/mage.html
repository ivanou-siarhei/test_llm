<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Low‑Poly Mage</title>
<style>
  body {margin:0; overflow:hidden; background:#111;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";

let scene, camera, renderer, mage, staff, particles, clock;
init();
animate();

function init(){
  const canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0,2,5);

  // lighting
  const hemi = new THREE.HemisphereLight(0x8888ff, 0x444433, 1.2);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5,10,7);
  scene.add(dir);

  // floor
  const floorGeo = new THREE.PlaneGeometry(20,20);
  const floorMat = new THREE.MeshStandardMaterial({color:0x222222, side:THREE.DoubleSide});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // mage group
  mage = new THREE.Group();
  scene.add(mage);

  const palette = {skin:0xf2c2a0, robe:0x663399, hat:0x2e004d, staff:0xccccff, glow:0x00ffff};

  // head (box)
  const headGeo = new THREE.BoxGeometry(1,1,1);
  const headMat = new THREE.MeshStandardMaterial({color:palette.skin});
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.5;
  mage.add(head);

  // hat (cone)
  const hatGeo = new THREE.ConeGeometry(0.75,1.5,4);
  const hatMat = new THREE.MeshStandardMaterial({color:palette.hat});
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 3.5;
  mage.add(hat);

  // body (box)
  const bodyGeo = new THREE.BoxGeometry(1.2,1.6,0.6);
  const bodyMat = new THREE.MeshStandardMaterial({color:palette.robe});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.4;
  mage.add(body);

  // arms (boxes)
  const armGeo = new THREE.BoxGeometry(0.3,1.2,0.3);
  const armMat = new THREE.MeshStandardMaterial({color:palette.robe});
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.9,1.6,0);
  leftArm.rotation.z = Math.PI/6;
  mage.add(leftArm);
  const rightArm = leftArm.clone();
  rightArm.position.x = 0.9;
  rightArm.rotation.z = -Math.PI/6;
  mage.add(rightArm);

  // staff (cylinder + sphere tip)
  const staffGeo = new THREE.CylinderGeometry(0.07,0.07,3,8);
  const staffMat = new THREE.MeshStandardMaterial({color:palette.staff});
  staff = new THREE.Mesh(staffGeo, staffMat);
  staff.position.set(0,0.8,0);
  staff.rotation.z = Math.PI/2;
  mage.add(staff);
  const tipGeo = new THREE.SphereGeometry(0.15,6,6);
  const tip = new THREE.Mesh(tipGeo, staffMat);
  tip.position.set(0,2.5,0);
  mage.add(tip);

  // particles (magic casting)
  const particleCount = 200;
  const particleGeo = new THREE.SphereGeometry(0.02,4,4);
  const particleMat = new THREE.MeshBasicMaterial({color:palette.glow, transparent:true, opacity:0.8});
  particles = new THREE.Group();
  for(let i=0;i<particleCount;i++){
    const p = new THREE.Mesh(particleGeo, particleMat);
    resetParticle(p);
    particles.add(p);
  }
  scene.add(particles);

  clock = new THREE.Clock();
  window.addEventListener('resize',onWindowResize);
  window.addEventListener('click',()=>casting=true);
}

let casting = false;
function resetParticle(p){
  // spawn near staff tip
  p.position.set(0,2.5,0);
  const dir = new THREE.Vector3(
    (Math.random()-0.5)*0.2,
    Math.random()*0.5+0.2,
    (Math.random()-0.5)*0.2
  );
  p.userData.vel = dir;
  p.userData.life = Math.random()*1+0.5;
}

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // idle breathing (scale)
  const scale = 1+0.02*Math.sin(t*2);
  mage.scale.set(scale,scale,scale);
  // staff swing
  staff.rotation.x = Math.sin(t*1.5)*0.05;
  // casting particles
  if(casting){
    particles.children.forEach(p=>{
      p.position.add(p.userData.vel);
      p.userData.life -= 0.02;
      if(p.userData.life<=0){resetParticle(p);}
    });
    // stop casting after short burst
    if(t%5<0.5) casting=false;
  }
  renderer.render(scene,camera);
}

function onWindowResize(){
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
</script>
</body>
</html>
