<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growing Plant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0705;
  overflow: hidden;
}
.container {
  width: min(90vw, 400px);
  aspect-ratio: 2/3;
}
svg {
  width: 100%;
  height: 100%;
  display: block;
}
@keyframes stemGrow {
  0% { stroke-dashoffset: 400; }
  37.5% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: 0; }
}
@keyframes stemWobble {
  0%, 100% { d: path("M200 550 Q195 480 200 410 Q205 340 198 270 Q192 200 200 130"); }
  25% { d: path("M200 550 Q208 480 198 410 Q192 340 205 270 Q212 200 198 130"); }
  50% { d: path("M200 550 Q192 480 202 410 Q208 340 195 270 Q188 200 200 130"); }
  75% { d: path("M200 550 Q205 480 198 410 Q192 340 203 270 Q210 200 200 130"); }
}
@keyframes fadeLoop {
  0%, 70% { opacity: 1; }
  87.5% { opacity: 0; }
  87.51%, 100% { opacity: 0; }
  100% { opacity: 1; }
}
.stem-group {
  animation: fadeLoop 8s infinite;
}
.stem-path {
  fill: none;
  stroke: url(#stemGrad);
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 400;
  stroke-dashoffset: 400;
  animation: stemGrow 3s ease-out forwards, stemWobble 2s ease-in-out infinite;
}
.leaf {
  transform-origin: 0 0;
  opacity: 0;
  animation: fadeLoop 8s infinite;
}
.leaf-left {
  transform-origin: 0 0;
}
.leaf-right {
  transform-origin: 0 0;
}
@keyframes leaf1Unfurl {
  0%, 20% { opacity: 0; transform: scale(0) rotate(-20deg); }
  25% { opacity: 1; transform: scale(1.15) rotate(-5deg); }
  30% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes leaf2Unfurl {
  0%, 30% { opacity: 0; transform: scale(0) rotate(20deg); }
  35% { opacity: 1; transform: scale(1.15) rotate(5deg); }
  40% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes leaf3Unfurl {
  0%, 40% { opacity: 0; transform: scale(0) rotate(-20deg); }
  45% { opacity: 1; transform: scale(1.15) rotate(-5deg); }
  50% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes leaf4Unfurl {
  0%, 50% { opacity: 0; transform: scale(0) rotate(20deg); }
  55% { opacity: 1; transform: scale(1.15) rotate(5deg); }
  60% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes leaf5Unfurl {
  0%, 58% { opacity: 0; transform: scale(0) rotate(-20deg); }
  63% { opacity: 1; transform: scale(1.15) rotate(-5deg); }
  68% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes windSway {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}
.leaf-group {
  animation: fadeLoop 8s infinite;
}
@keyframes stemFadeIn {
  0%, 87.5% { opacity: 1; }
  87.51%, 100% { opacity: 0; }
}
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2d4a2d"/>
      <stop offset="100%" stop-color="#5a9a5a"/>
    </linearGradient>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ab86a"/>
      <stop offset="100%" stop-color="#4a7c4a"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9a5a"/>
      <stop offset="100%" stop-color="#3d6b3d"/>
    </linearGradient>
    <radialGradient id="soilGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#2d1b0e"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="400" height="600" fill="#1a0f08"/>
  <ellipse cx="200" cy="600" rx="250" ry="120" fill="url(#soilGrad)"/>
  <g class="stem-group">
    <path class="stem-path" d="M200 550 Q195 480 200 410 Q205 340 198 270 Q192 200 200 130"/>
    <g class="leaf-group" transform="translate(200, 460)">
      <path class="leaf leaf-left" d="M0 0 Q-35 -20 -55 -5 Q-35 10 0 0" fill="url(#leafGrad1)"
            style="animation: leaf1Unfurl 8s infinite 0.3s;"/>
      <path class="leaf leaf-right" d="M0 0 Q35 -20 55 -5 Q35 10 0 0" fill="url(#leafGrad2)"
            style="animation: leaf2Unfurl 8s infinite 0.6s;"/>
    </g>
    <g class="leaf-group" transform="translate(200, 370)">
      <path class="leaf leaf-left" d="M0 0 Q-40 -25 -65 -8 Q-40 12 0 0" fill="url(#leafGrad2)"
            style="animation: leaf3Unfurl 8s infinite 1.0s;"/>
      <path class="leaf leaf-right" d="M0 0 Q40 -25 65 -8 Q40 12 0 0" fill="url(#leafGrad1)"
            style="animation: leaf4Unfurl 8s infinite 1.3s;"/>
    </g>
    <g class="leaf-group" transform="translate(200, 280)">
      <path class="leaf leaf-left" d="M0 0 Q-30 -18 -50 -5 Q-30 8 0 0" fill="url(#leafGrad1)"
            style="animation: leaf5Unfurl 8s infinite 1.7s;"/>
    </g>
  </g>
</svg>
</div>
<script>
(function() {
  const leaves = document.querySelectorAll('.leaf-group');
  const time = 8000;
  let startTime = null;
  const windAmplitude = 6;
  const windFrequency = 0.6;
  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = (timestamp - startTime) % time;
    const t = elapsed / time;
    leaves.forEach((leaf, i) => {
      const phase = (t + i * 0.08) % 1;
      if (phase > 0.15 && phase < 0.85) {
        const wobble = Math.sin(elapsed * 0.001 * windFrequency + i * 1.5) * windAmplitude;
        leaf.style.transform = `rotate(${wobble}deg)`;
      }
    });
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
