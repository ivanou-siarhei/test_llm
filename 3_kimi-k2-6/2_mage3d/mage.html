<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low-Poly 3D Mage</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<script>
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 10, 40);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3.5, 6);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404080, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.9, metalness: 0.1, flatShading: true });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Mage Group
    const mageGroup = new THREE.Group();

    // Materials
    const robeMat = new THREE.MeshStandardMaterial({ color: 0x4b0082, flatShading: true, roughness: 0.7 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, flatShading: true });
    const staffMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, flatShading: true });
    const gemMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8, flatShading: true });
    const beltMat = new THREE.MeshStandardMaterial({ color: 0xffd700, flatShading: true });

    // Robe (Cone)
    const robe = new THREE.Mesh(new THREE.ConeGeometry(1, 2.8, 6), robeMat);
    robe.position.y = 1.4;
    robe.castShadow = true;
    mageGroup.add(robe);

    // Belt
    const belt = new THREE.Mesh(new THREE.TorusGeometry(0.85, 0.08, 4, 8), beltMat);
    belt.rotation.x = Math.PI / 2;
    belt.position.y = 1.3;
    mageGroup.add(belt);

    // Head
    const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.35, 0), skinMat);
    head.position.y = 2.85;
    head.castShadow = true;
    mageGroup.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.04, 4, 4);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.1, 2.9, 0.3);
    mageGroup.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.1, 2.9, 0.3);
    mageGroup.add(rightEye);

    // Beard
    const beard = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 4), robeMat);
    beard.position.set(0, 2.6, 0.15);
    beard.rotation.x = Math.PI;
    mageGroup.add(beard);

    // Hat
    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.55, 1.1, 6), robeMat);
    hat.position.y = 3.35;
    hat.castShadow = true;
    mageGroup.add(hat);

    // Right hand
    const handGeo = new THREE.SphereGeometry(0.09, 4, 4);
    const rightHand = new THREE.Mesh(handGeo, skinMat);
    rightHand.position.set(0.7, 2.3, 0.3);
    mageGroup.add(rightHand);

    // Staff
    const staffGroup = new THREE.Group();
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.8, 5), staffMat);
    pole.position.y = 1.4;
    pole.castShadow = true;
    staffGroup.add(pole);

    const gem = new THREE.Mesh(new THREE.IcosahedronGeometry(0.12, 0), gemMat);
    gem.position.y = 2.8;
    staffGroup.add(gem);

    const staffLight = new THREE.PointLight(0x00ffff, 1.5, 4);
    staffLight.position.y = 2.8;
    staffGroup.add(staffLight);

    staffGroup.position.set(0.7, 0, 0.3);
    staffGroup.rotation.z = -0.1;
    mageGroup.add(staffGroup);

    // Particle emitter
    const emitter = new THREE.Object3D();
    emitter.position.y = 2.8;
    staffGroup.add(emitter);

    scene.add(mageGroup);

    // Magic Particle System
    const particleCount = 50;
    const particles = [];
    const particleGeo = new THREE.TetrahedronGeometry(0.06, 0);
    const particleMatBase = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.9 });

    for (let i = 0; i < particleCount; i++) {
        const mesh = new THREE.Mesh(particleGeo, particleMatBase.clone());
        mesh.visible = false;
        mesh.userData = {
            velocity: new THREE.Vector3(),
            life: 0,
            maxLife: 60 + Math.random() * 60
        };
        scene.add(mesh);
        particles.push(mesh);
    }

    const spawnPos = new THREE.Vector3();

    function animateParticles() {
        emitter.getWorldPosition(spawnPos);

        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            if (p.userData.life > 0) {
                p.position.add(p.userData.velocity);
                p.userData.life -= 1;
                p.rotation.x += 0.1;
                p.rotation.y += 0.05;
                const s = Math.max(0, p.userData.life / p.userData.maxLife);
                p.scale.setScalar(s);
                if (p.userData.life <= 0) {
                    p.visible = false;
                }
            } else {
                p.visible = true;
                p.position.copy(spawnPos).add(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2
                ));
                p.userData.velocity.set(
                    (Math.random() - 0.5) * 0.02,
                    Math.random() * 0.02 + 0.01,
                    (Math.random() - 0.5) * 0.02
                );
                p.userData.life = p.userData.maxLife;
                p.scale.setScalar(1);
            }
        }
    }

    // Animation Loop
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        // Idle breathing
        mageGroup.position.y = Math.sin(time * 1.5) * 0.08;

        // Staff movement
        staffGroup.rotation.z = -0.1 + Math.sin(time * 1.5 + 1) * 0.08;
        staffGroup.rotation.x = Math.sin(time * 1.2) * 0.05;

        // Hat wiggle
        hat.rotation.z = Math.sin(time * 1.5) * 0.02;
        hat.rotation.x = Math.cos(time * 1.3) * 0.02;

        // Magic particles
        animateParticles();

        renderer.render(scene, camera);
    }

    animate();

    // Responsive resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
