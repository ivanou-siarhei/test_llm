<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low-Poly Mage</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; }
canvas { display: block; }
#ui {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 10;
}
#ui button {
  padding: 10px 24px; border: 2px solid #0ff; border-radius: 8px;
  background: rgba(10,10,30,0.85); color: #0ff; font-size: 15px;
  cursor: pointer; font-family: monospace; transition: all 0.25s;
  text-shadow: 0 0 8px #0ff;
}
#ui button:hover { background: rgba(0,255,255,0.15); box-shadow: 0 0 16px #0ff4; }
#ui button.active { background: rgba(0,255,255,0.25); border-color: #f0f; color: #f0f; text-shadow: 0 0 8px #f0f; }
</style>
</head>
<body>
<div id="ui">
  <button id="btnIdle" class="active" onclick="setMode('idle')">Idle</button>
  <button id="btnCast" onclick="setMode('cast')">Cast Spell</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let mode = 'idle';
let castTimer = 0;
const CAST_DURATION = 2.8;
window.setMode = function(m) {
  mode = m;
  castTimer = 0;
  document.getElementById('btnIdle').classList.toggle('active', m === 'idle');
  document.getElementById('btnCast').classList.toggle('active', m === 'cast');
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.025);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 3.2, 6.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance = 3;
controls.maxDistance = 14;
controls.update();

// ── Colors ──
const COL = {
  robe: 0x3a1a6e,
  robeDark: 0x220e48,
  hat: 0x4b1a8a,
  hatBand: 0x0fffc8,
  skin: 0xd4a574,
  beard: 0xcccccc,
  staff: 0x5c3a1e,
  staffGem: 0x00ffe0,
  orb: 0x00ffcc,
  belt: 0x8b6914,
  boots: 0x2a1a0e,
  floor: 0x12102a,
  floorLine: 0x1a1640,
};

// ── Materials ──
const mat = (color, opts = {}) => new THREE.MeshStandardMaterial({
  color, flatShading: true, roughness: 0.7, metalness: 0.05, ...opts
});
const matRobe = mat(COL.robe);
const matRobeDark = mat(COL.robeDark);
const matHat = mat(COL.hat);
const matHatBand = mat(COL.hatBand, { emissive: COL.hatBand, emissiveIntensity: 0.6, roughness: 0.3 });
const matSkin = mat(COL.skin);
const matBeard = mat(COL.beard);
const matStaff = mat(COL.staff);
const matStaffGem = mat(COL.staffGem, { emissive: COL.staffGem, emissiveIntensity: 1.5, roughness: 0.2, metalness: 0.3 });
const matBelt = mat(COL.belt, { metalness: 0.4, roughness: 0.4 });
const matBoots = mat(COL.boots);

// ── Mage Group ──
const mage = new THREE.Group();
scene.add(mage);

// Body / Robe — tapered cylinder via lathe
const robePts = [
  new THREE.Vector2(0.0, 0.0),
  new THREE.Vector2(0.38, 0.05),
  new THREE.Vector2(0.44, 0.3),
  new THREE.Vector2(0.50, 0.9),
  new THREE.Vector2(0.52, 1.3),
  new THREE.Vector2(0.46, 1.6),
  new THREE.Vector2(0.38, 1.85),
  new THREE.Vector2(0.30, 2.05),
];
const robeGeo = new THREE.LatheGeometry(robePts, 8);
const robe = new THREE.Mesh(robeGeo, matRobe);
robe.castShadow = true;
robe.receiveShadow = true;
mage.add(robe);

// Robe skirt flare
const skirtPts = [
  new THREE.Vector2(0.30, 2.05),
  new THREE.Vector2(0.36, 1.9),
  new THREE.Vector2(0.50, 1.5),
  new THREE.Vector2(0.58, 0.8),
  new THREE.Vector2(0.62, 0.3),
  new THREE.Vector2(0.64, 0.0),
];
const skirtGeo = new THREE.LatheGeometry(skirtPts, 8);
const skirt = new THREE.Mesh(skirtGeo, matRobeDark);
skirt.castShadow = true;
mage.add(skirt);

// Belt
const beltGeo = new THREE.TorusGeometry(0.33, 0.04, 6, 8);
const belt = new THREE.Mesh(beltGeo, matBelt);
belt.position.y = 1.85;
belt.rotation.x = Math.PI / 2;
mage.add(belt);

// ── Head ──
const headGroup = new THREE.Group();
headGroup.position.y = 2.2;
mage.add(headGroup);

// Head sphere
const headGeo = new THREE.SphereGeometry(0.28, 6, 5);
const head = new THREE.Mesh(headGeo, matSkin);
head.castShadow = true;
headGroup.add(head);

// Eyes
const eyeGeo = new THREE.SphereGeometry(0.045, 4, 4);
const eyeMat = mat(0x1a1a2e, { emissive: 0x0ff, emissiveIntensity: 0.8 });
const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
eyeL.position.set(-0.1, 0.04, 0.24);
headGroup.add(eyeL);
const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
eyeR.position.set(0.1, 0.04, 0.24);
headGroup.add(eyeR);

// Beard
const beardGeo = new THREE.ConeGeometry(0.18, 0.45, 5);
const beard = new THREE.Mesh(beardGeo, matBeard);
beard.position.set(0, -0.28, 0.08);
beard.rotation.x = 0.15;
headGroup.add(beard);

// ── Hat ──
const hatGroup = new THREE.Group();
hatGroup.position.y = 0.28;
headGroup.add(hatGroup);

// Brim
const brimGeo = new THREE.CylinderGeometry(0.48, 0.52, 0.06, 8);
const brim = new THREE.Mesh(brimGeo, matHat);
brim.castShadow = true;
hatGroup.add(brim);

// Cone
const coneGeo = new THREE.ConeGeometry(0.38, 1.1, 8);
const cone = new THREE.Mesh(coneGeo, matHat);
cone.position.y = 0.58;
cone.castShadow = true;
hatGroup.add(cone);

// Hat tip — slight bend
const tipGeo = new THREE.SphereGeometry(0.06, 4, 4);
const tipMat = mat(0xff44ff, { emissive: 0xff44ff, emissiveIntensity: 0.8 });
const tip = new THREE.Mesh(tipGeo, tipMat);
tip.position.set(0.12, 1.15, -0.08);
hatGroup.add(tip);

// Hat band
const hatBandGeo = new THREE.TorusGeometry(0.39, 0.035, 5, 8);
const hatBand = new THREE.Mesh(hatBandGeo, matHatBand);
hatBand.position.y = 0.12;
hatBand.rotation.x = Math.PI / 2;
hatGroup.add(hatBand);

// ── Arms ──
const armGroup = new THREE.Group();
armGroup.position.set(0.35, 1.8, 0);
mage.add(armGroup);

const armGeo = new THREE.BoxGeometry(0.14, 0.6, 0.14);
const arm = new THREE.Mesh(armGeo, matRobe);
arm.position.y = -0.3;
arm.castShadow = true;
armGroup.add(arm);

// Sleeve (wider at shoulder)
const sleeveGeo = new THREE.CylinderGeometry(0.16, 0.1, 0.25, 6);
const sleeve = new THREE.Mesh(sleeveGeo, matRobeDark);
sleeve.position.y = -0.02;
armGroup.add(sleeve);

// Hand
const handGeo = new THREE.SphereGeometry(0.07, 4, 4);
const hand = new THREE.Mesh(handGeo, matSkin);
hand.position.y = -0.62;
armGroup.add(hand);

// Left arm (mirror)
const armGroupL = new THREE.Group();
armGroupL.position.set(-0.35, 1.8, 0);
mage.add(armGroupL);
const armL = new THREE.Mesh(armGeo, matRobe);
armL.position.y = -0.3;
armL.castShadow = true;
armGroupL.add(armL);
const sleeveL = new THREE.Mesh(sleeveGeo, matRobeDark);
sleeveL.position.y = -0.02;
armGroupL.add(sleeveL);
const handL = new THREE.Mesh(handGeo, matSkin);
handL.position.y = -0.62;
armGroupL.add(handL);

// ── Staff ──
const staffGroup = new THREE.Group();
staffGroup.position.set(0.55, 0.0, 0.1);
mage.add(staffGroup);

const staffGeo = new THREE.CylinderGeometry(0.035, 0.045, 3.2, 6);
const staffMesh = new THREE.Mesh(staffGeo, matStaff);
staffMesh.position.y = 1.6;
staffMesh.castShadow = true;
staffGroup.add(staffMesh);

// Staff orb
const orbGeo = new THREE.SphereGeometry(0.14, 6, 5);
const orb = new THREE.Mesh(orbGeo, matStaffGem);
orb.position.y = 3.3;
staffGroup.add(orb);

// Orb ring
const orbRingGeo = new THREE.TorusGeometry(0.2, 0.015, 4, 8);
const orbRingMat = mat(COL.staffGem, { emissive: COL.staffGem, emissiveIntensity: 2.0, transparent: true, opacity: 0.7 });
const orbRing = new THREE.Mesh(orbRingGeo, orbRingMat);
orbRing.position.y = 3.3;
staffGroup.add(orbRing);

const orbRing2 = new THREE.Mesh(orbRingGeo, orbRingMat);
orbRing2.position.y = 3.3;
orbRing2.rotation.x = Math.PI / 2;
staffGroup.add(orbRing2);

// Staff crystal accents
for (let i = 0; i < 3; i++) {
  const accentGeo = new THREE.OctahedronGeometry(0.04, 0);
  const accent = new THREE.Mesh(accentGeo, orbRingMat);
  accent.position.y = 3.3;
  accent.position.x = Math.cos(i * Math.PI * 2 / 3) * 0.22;
  accent.position.z = Math.sin(i * Math.PI * 2 / 3) * 0.22;
  staffGroup.add(accent);
}

// ── Boots peek ──
const bootGeo = new THREE.BoxGeometry(0.18, 0.1, 0.24);
const bootL = new THREE.Mesh(bootGeo, matBoots);
bootL.position.set(-0.15, 0.05, 0.04);
mage.add(bootL);
const bootR = new THREE.Mesh(bootGeo, matBoots);
bootR.position.set(0.15, 0.05, 0.04);
mage.add(bootR);

// ── Floor ──
const floorGeo = new THREE.CircleGeometry(12, 32);
const floorMat = mat(COL.floor, { roughness: 0.95 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Floor runes
const runeGroup = new THREE.Group();
scene.add(runeGroup);
const runeMat = new THREE.MeshBasicMaterial({ color: 0x2a1a5e, transparent: true, opacity: 0.35 });
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const rGeo = new THREE.RingGeometry(0.15, 0.2, 3);
  const rMesh = new THREE.Mesh(rGeo, runeMat);
  rMesh.position.set(Math.cos(angle) * 1.2, 0.01, Math.sin(angle) * 1.2);
  rMesh.rotation.x = -Math.PI / 2;
  rMesh.rotation.z = angle;
  runeGroup.add(rMesh);
}
const circleGeo = new THREE.RingGeometry(1.0, 1.05, 32);
const circleMesh = new THREE.Mesh(circleGeo, runeMat);
circleMesh.rotation.x = -Math.PI / 2;
circleMesh.position.y = 0.01;
runeGroup.add(circleMesh);

// ── Lighting ──
const ambient = new THREE.AmbientLight(0x2a1a4e, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xeeddff, 1.2);
dirLight.position.set(4, 8, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x3311aa, 0.4);
fillLight.position.set(-3, 4, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x00ccff, 0.3);
rimLight.position.set(-2, 3, 5);
scene.add(rimLight);

// Staff point light
const staffLight = new THREE.PointLight(0x00ffe0, 1.5, 6);
staffLight.position.set(0.55, 3.5, 0.1);
mage.add(staffLight);

// Casting light (initially off)
const castLight = new THREE.PointLight(0x00ffcc, 0, 10);
castLight.position.set(0, 2.5, 0.5);
mage.add(castLight);

// ── Particle System ──
const MAX_PARTICLES = 500;
const particlePositions = new Float32Array(MAX_PARTICLES * 3);
const particleSizes = new Float32Array(MAX_PARTICLES);
const particleColors = new Float32Array(MAX_PARTICLES * 3);
const particleAlphas = new Float32Array(MAX_PARTICLES);

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
particleGeo.setAttribute('aColor', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('aAlpha', new THREE.BufferAttribute(particleAlphas, 1));

const particleVS = `
  attribute float size;
  attribute vec3 aColor;
  attribute float aAlpha;
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    vColor = aColor;
    vAlpha = aAlpha;
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = size * (200.0 / -mvPos.z);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const particleFS = `
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    float d = length(gl_PointCoord - vec2(0.5));
    if (d > 0.5) discard;
    float a = smoothstep(0.5, 0.1, d) * vAlpha;
    gl_FragColor = vec4(vColor, a);
  }
`;

const particleMat = new THREE.ShaderMaterial({
  vertexShader: particleVS,
  fragmentShader: particleFS,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Particle pool
class Particle {
  constructor() { this.active = false; this.idx = 0; this.x = 0; this.y = 0; this.z = 0; this.vx = 0; this.vy = 0; this.vz = 0; this.life = 0; this.maxLife = 1; this.size = 1; this.r = 0; this.g = 1; this.b = 0.8; }
  spawn(x, y, z, vx, vy, vz, life, size, r, g, b) {
    this.active = true; this.x = x; this.y = y; this.z = z;
    this.vx = vx; this.vy = vy; this.vz = vz;
    this.life = life; this.maxLife = life; this.size = size;
    this.r = r; this.g = g; this.b = b;
  }
  update(dt) {
    if (!this.active) return;
    this.life -= dt;
    if (this.life <= 0) { this.active = false; return; }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.z += this.vz * dt;
    this.vy += 0.3 * dt; // slight upward drift
  }
}

const pool = Array.from({ length: MAX_PARTICLES }, () => new Particle());
let poolIdx = 0;

function emitParticle(x, y, z, vx, vy, vz, life, size, r, g, b) {
  const p = pool[poolIdx];
  poolIdx = (poolIdx + 1) % MAX_PARTICLES;
  p.spawn(x, y, z, vx, vy, vz, life, size, r, g, b);
}

function updateParticles(dt) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = pool[i];
    p.update(dt);
    const i3 = i * 3;
    if (p.active) {
      const t = p.life / p.maxLife;
      particlePositions[i3] = p.x;
      particlePositions[i3 + 1] = p.y;
      particlePositions[i3 + 2] = p.z;
      particleSizes[i] = p.size * t;
      particleColors[i3] = p.r;
      particleColors[i3 + 1] = p.g;
      particleColors[i3 + 2] = p.b;
      particleAlphas[i] = t;
    } else {
      particlePositions[i3] = 0;
      particlePositions[i3 + 1] = -100;
      particlePositions[i3 + 2] = 0;
      particleSizes[i] = 0;
      particleAlphas[i] = 0;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.size.needsUpdate = true;
  particleGeo.attributes.aColor.needsUpdate = true;
  particleGeo.attributes.aAlpha.needsUpdate = true;
}

// ── Idle Particles (subtle staff glow) ──
function emitIdleParticles(t) {
  if (Math.random() > 0.15) return;
  const angle = Math.random() * Math.PI * 2;
  const r = 0.1 + Math.random() * 0.1;
  const worldOrb = new THREE.Vector3(0.55 + Math.cos(angle) * r, 3.3, 0.1 + Math.sin(angle) * r);
  mage.localToWorld(worldOrb);
  emitParticle(
    worldOrb.x, worldOrb.y, worldOrb.z,
    (Math.random() - 0.5) * 0.3,
    0.3 + Math.random() * 0.5,
    (Math.random() - 0.5) * 0.3,
    0.6 + Math.random() * 0.8,
    0.5 + Math.random() * 0.8,
    0, 1, 0.9
  );
}

// ── Cast Particles ──
function emitCastParticles(t) {
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.3;
    const worldOrb = new THREE.Vector3(0.55, 3.3, 0.1);
    mage.localToWorld(worldOrb);

    const speed = 1.0 + Math.random() * 3.0;
    const vx = (Math.random() - 0.5) * speed + Math.cos(angle) * 0.5;
    const vy = 0.5 + Math.random() * 2.5;
    const vz = (Math.random() - 0.5) * speed + Math.sin(angle) * 0.5;
    const life = 0.8 + Math.random() * 1.5;
    const size = 1.0 + Math.random() * 2.0;

    const colorChoice = Math.random();
    let cr, cg, cb;
    if (colorChoice < 0.4) { cr = 0; cg = 1; cb = 0.9; }
    else if (colorChoice < 0.7) { cr = 0.5; cg = 0.3; cb = 1; }
    else if (colorChoice < 0.9) { cr = 1; cg = 1; cb = 1; }
    else { cr = 1; cg = 0.2; cb = 0.8; }

    emitParticle(worldOrb.x, worldOrb.y, worldOrb.z, vx, vy, vz, life, size, cr, cg, cb);
  }

  // Ground circle particles
  if (Math.random() > 0.5) {
    const angle = Math.random() * Math.PI * 2;
    const r = 0.8 + Math.random() * 0.3;
    emitParticle(
      Math.cos(angle) * r, 0.05, Math.sin(angle) * r,
      0, 1.5 + Math.random(), 0,
      0.6 + Math.random() * 0.4, 0.5 + Math.random() * 0.3,
      0.2, 0, 0.8
    );
  }
}

// ── Animation ──
const clock = new THREE.Clock();
let totalTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  totalTime += dt;

  const t = totalTime;

  // ── Idle animation ──
  const breathe = Math.sin(t * 1.5) * 0.02;
  mage.position.y = breathe;

  // Slight sway
  mage.rotation.z = Math.sin(t * 0.7) * 0.015;
  mage.rotation.x = Math.sin(t * 0.5) * 0.008;

  // Head slight bob
  headGroup.rotation.y = Math.sin(t * 0.6) * 0.04;
  headGroup.rotation.z = Math.sin(t * 0.8) * 0.02;

  // Staff idle sway
  staffGroup.rotation.z = Math.sin(t * 0.9) * 0.03;
  staffGroup.rotation.x = Math.sin(t * 0.65) * 0.015;

  // Arm idle sway
  armGroup.rotation.z = Math.sin(t * 0.8) * 0.05 - 0.1;
  armGroupL.rotation.z = -Math.sin(t * 0.8 + 0.5) * 0.05 + 0.1;

  // Orb rings rotate
  orbRing.rotation.z = t * 0.8;
  orbRing.rotation.y = t * 0.5;
  orbRing2.rotation.x = t * 0.6;
  orbRing2.rotation.z = t * 0.9;

  // Crystal accents orbit
  for (let i = 0; i < 3; i++) {
    const a = i * Math.PI * 2 / 3 + t * 1.2;
    staffGroup.children[staffGroup.children.length - 3 + i].position.x = Math.cos(a) * 0.22;
    staffGroup.children[staffGroup.children.length - 3 + i].position.z = Math.sin(a) * 0.22;
  }

  // Hat tip pulse
  tip.scale.setScalar(1 + Math.sin(t * 2) * 0.15);

  // Staff light pulse
  staffLight.intensity = 1.5 + Math.sin(t * 2.5) * 0.5;

  // Rune circle pulse
  runeGroup.children.forEach((c, i) => {
    c.material.opacity = 0.2 + Math.sin(t * 1.2 + i * 0.5) * 0.15;
  });

  // ── Cast animation ──
  if (mode === 'cast') {
    castTimer += dt;

    const progress = Math.min(castTimer / CAST_DURATION, 1);

    // Staff raised
    staffGroup.rotation.z = -0.2 - progress * 0.4;
    staffGroup.rotation.x = -0.1 * progress;

    // Arms raised toward staff
    armGroup.rotation.z = -0.3 - progress * 0.5;
    armGroup.rotation.x = -progress * 0.3;
    armGroupL.rotation.z = 0.3 + progress * 0.5;
    armGroupL.rotation.x = -progress * 0.3;

    // Head looks up
    headGroup.rotation.x = -progress * 0.15;

    // Mage levitates slightly
    mage.position.y = breathe + progress * 0.15;

    // Cast light
    castLight.intensity = Math.sin(progress * Math.PI) * 5;
    castLight.position.y = 2.5 + progress * 1.5;

    // Staff light ramps up
    staffLight.intensity = 2 + progress * 4;
    staffLight.distance = 6 + progress * 6;
    matStaffGem.emissiveIntensity = 1.5 + progress * 3;
    orbRingMat.emissiveIntensity = 2 + progress * 4;

    // Hat tip glow
    tipMat.emissiveIntensity = 0.8 + progress * 2;
    tip.scale.setScalar(1 + progress * 0.4 + Math.sin(t * 6) * 0.1);

    // Emit cast particles (peak in middle)
    if (progress < 0.85) {
      emitCastParticles(t);
    }

    // Reset after cast
    if (castTimer > CAST_DURATION + 0.5) {
      mode = 'idle';
      castTimer = 0;
      document.getElementById('btnIdle').classList.add('active');
      document.getElementById('btnCast').classList.remove('active');
    }
  } else {
    // Reset cast params
    castLight.intensity *= 0.9;
    matStaffGem.emissiveIntensity = 1.5;
    orbRingMat.emissiveIntensity = 2;
    tipMat.emissiveIntensity = 0.8;
    staffLight.distance = 6;

    emitIdleParticles(t);
  }

  updateParticles(dt);
  controls.update();
  renderer.render(scene, camera);
}

animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
